<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beliapa - Register & Login</title>
    <style>
        /* Gaya Dasar sesuai Identitas Visual */
        body {
            font-family: 'Calibri', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            color: #4285f4;
            font-style: italic;
            font-weight: bold;
            font-size: 32px;
            margin: 5px 0;
        }

        h2.page-title {
            font-size: 24px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .sub-text {
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* Desain Kartu (Card) */
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: left;
        }

        .input-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .input-group label {
            width: 80px;
            font-size: 14px;
        }

        .input-group input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Calibri', sans-serif;
            outline: none;
        }

        /* Tombol */
        .btn-primary {
            width: 100%;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Calibri', sans-serif;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: #f0f0f0;
        }

        .footer-link {
            margin-top: 25px;
            color: #5d5dff;
            font-style: italic;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="register-section">
            <h2 class="page-title">Halaman REGISTER</h2>
            <h1 class="logo">beliapa</h1>
            <p class="sub-text">Belum punya Akun? Daftar sekarang</p>
            
            <div class="card">
                <div class="input-group">
                    <label>Nama</label>
                    <input type="text" id="reg-name">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="reg-email">
                </div>
                <div class="input-group">
                    <label>Whatsapp</label>
                    <input type="tel" id="reg-wa">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="reg-pass">
                </div>
                <button class="btn-primary" onclick="prosesDaftar()">Simpan</button>
            </div>
            
            <p class="footer-link" onclick="tampilLogin()">Sudah punya Akun? Masuk disini</p>
        </div>

        <div id="login-section" style="display: none;">
            <h2 class="page-title">Halaman LOGIN</h2>
            <h1 class="logo">beliapa</h1>
            <p class="sub-text">Sudah punya Akun? Masuk sekarang</p>
            
            <div class="card">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="login-email">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-pass">
                </div>
                <button class="btn-primary">Masuk</button>
            </div>
            
            <p class="footer-link" onclick="tampilRegister()">Belum punya Akun? Daftar disini</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>

<script>
// 1. Inisialisasi Appwrite
const { Client, Databases, ID } = Appwrite;
const client = new Client()
    .setEndpoint('https://sgp.cloud.appwrite.io/v1') 
    .setProject('beliapa'); 

const databases = new Databases(client);
const DATABASE_ID = '69ae8aaf001fcab01e83'; 
const COLLECTION_ID = '69ae8aaf001fcab01e83'; // Gunakan ID unik yang Anda copy tadi

// 2. Fungsi Navigasi (Agar link biru bisa diklik)
function tampilLogin() {
    document.getElementById('register-section').style.display = 'none';
    document.getElementById('login-section').style.display = 'block';
}

function tampilRegister() {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('register-section').style.display = 'block';
}

// 3. Fungsi Simpan (Tombol Register)
async function prosesDaftar() {
    const name = document.getElementById('reg-name').value;
    const email = document.getElementById('reg-email').value;
    const wa = document.getElementById('reg-wa').value;

    // Validasi sederhana agar tidak kosong
    if(!name || !email || !wa) {
        alert("Mohon isi semua data!");
        return;
    }

    try {
        await databases.createDocument(DATABASE_ID, COLLECTION_ID, ID.unique(), {
            username: name,
            email: email,
            whatsapp: wa
        });

        alert("Pendaftaran Berhasil! Silakan Login.");
        tampilLogin();
    } catch (error) {
        if (error.code === 409) {
            alert("Maaf, Email, Username, atau WhatsApp sudah digunakan!");
        } else {
            alert("Terjadi kesalahan: " + error.message);
        }
    }
}

// 4. Pastikan Tombol HTML memanggil fungsi yang benar
// Cari tag <button> di bagian Register Anda, pastikan isinya:
// <button class="btn-primary" onclick="prosesDaftar()">Simpan</button>
</script>
</body>
</html>
